<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to FieldHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fa;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem 3rem;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .logo {
      max-width: 220px;
      height: auto;
      margin-bottom: 1.5rem;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 2rem;
    }
    p {
      margin: 0.5rem 0;
      font-size: 1rem;
    }
    a {
      color: #0077cc;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      src="/assets/images/fieldhub-logo.png"
      alt="FieldHub logo"
      class="logo"
    />

    <h1>Welcome to FieldHub</h1>

    <p>For more about our apps, please contact:</p>
    <p>
      <a href="mailto:support@FieldHub.uk">
        support@FieldHub.uk
      </a>
    </p>
  </div>
</body>
</html>
