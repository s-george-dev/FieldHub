<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FieldHub Password Reset</title>
  <style>
    :root {
      --bg: #101512;
      --panel: #1a211d;
      --panel-border: #324136;
      --text: #f3f5f1;
      --muted: #aab5ab;
      --accent: #f57c00;
      --accent-strong: #d45a00;
      --success-bg: #183522;
      --success-text: #9be7b0;
      --error-bg: #3a1e1a;
      --error-text: #ffb4a8;
      --input: #111713;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(119, 209, 11, 0.18), transparent 35%),
        linear-gradient(160deg, #0d120f, #171f1a 55%, #2a1c12);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(26, 33, 29, 0.96);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .logo {
      max-width: 160px;
      height: auto;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status {
      display: none;
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    input {
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: var(--input);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 124, 0, 0.15);
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .hint {
      margin-top: 16px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="assets/images/fieldhub-logo.png" alt="FieldHub Logo" class="logo">
    
    <h1>Reset your password</h1>
    <p>Choose a new password for your FieldHub account.</p>

    <div id="status" class="status"></div>

    <form id="reset-form" novalidate>
      <label for="password">New password</label>
      <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>

      <label for="confirm-password">Confirm password</label>
      <input id="confirm-password" name="confirm-password" type="password" minlength="8" autocomplete="new-password" required>

      <button id="submit-button" type="submit">Update password</button>
    </form>

    <p id="success-hint" class="hint hidden">
      Your password has been updated. You can return to FieldHub and sign in with the new password.
    </p>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://lgchqleltppfdgtpgsbj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ZHBBlxQVW0MBUUwQ5Kv1Aw_uufRzvu1";

    const statusEl = document.getElementById("status");
    const formEl = document.getElementById("reset-form");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirm-password");
    const submitButtonEl = document.getElementById("submit-button");
    const successHintEl = document.getElementById("success-hint");

    const showStatus = (message, type) => {
      statusEl.textContent = message;
      statusEl.className = `status show ${type}`;
    };

    const clearStatus = () => {
      statusEl.textContent = "";
      statusEl.className = "status";
    };

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const queryParams = new URLSearchParams(window.location.search);
// 1. Grab the source parameter
const sourceApp = queryParams.get("source") || hashParams.get("source");

// 2. Select the elements we want to dynamically change
const logoEl = document.querySelector(".logo");
const titleEl = document.querySelector("h1");
const introTextEl = document.querySelector("main p");
const rootStyle = document.documentElement.style; 

// Helper function to update or create the favicon
const updateFavicon = (iconUrl) => {
  let link = document.querySelector("link[rel~='icon']");
  if (!link) {
    link = document.createElement("link");
    link.rel = "icon";
    document.head.appendChild(link);
  }
  link.href = iconUrl;
};

// 3. Apply the branding logic
if (sourceApp === "app-orchardops") {
  // Update text
  titleEl.textContent = "Reset OrchardOps Password";
  introTextEl.textContent = "Choose a new password for your OrchardOps account.";
  
  // Update logo using your exact path
  logoEl.src = "assets/images/OrchardOpsLogo.png";
  logoEl.alt = "OrchardOps Logo";

  // Update background image (overrides the CSS gradients)
  document.body.style.background = "url('assets/images/background-orchardops.jpg') center/cover no-repeat fixed";

  // Update favicon
  updateFavicon("assets/images/favicon_orchardops.png");

  // Update theme colors (Optional: adjust these to match your new background)
  rootStyle.setProperty("--accent", "#2e7d32"); 
  rootStyle.setProperty("--accent-strong", "#1b5e20"); 
} 
// Add other apps here later
/* else if (sourceApp === "app-vineyard") { ... } */
    const accessToken = hashParams.get("access_token") || queryParams.get("access_token");
    const refreshToken = hashParams.get("refresh_token") || queryParams.get("refresh_token");
    const type = hashParams.get("type") || queryParams.get("type");

    const initializeRecoverySession = async () => {
      if (!accessToken || !refreshToken || type !== "recovery") {
        formEl.classList.add("hidden");
        showStatus(
          "This password reset link is invalid or has expired. Request a new reset email from FieldHub.",
          "error"
        );
        return;
      }

      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });

      if (error) {
        formEl.classList.add("hidden");
        showStatus(
          error.message || "We could not verify this reset link. Request a new email and try again.",
          "error"
        );
        return;
      }

      window.history.replaceState({}, document.title, window.location.pathname);
    };

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();

      const password = passwordEl.value.trim();
      const confirmPassword = confirmPasswordEl.value.trim();

      if (password.length < 8) {
        showStatus("Use a password that is at least 8 characters long.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showStatus("The passwords do not match.", "error");
        return;
      }

      submitButtonEl.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });

      submitButtonEl.disabled = false;

      if (error) {
        showStatus(
          error.message || "Password update failed. Request a fresh reset link and try again.",
          "error"
        );
        return;
      }

      formEl.reset();
      formEl.classList.add("hidden");
      successHintEl.classList.remove("hidden");
      showStatus("Password updated successfully.", "success");
    });

    initializeRecoverySession();
  </script>
</body>
</html>
